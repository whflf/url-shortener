version: '3.8'
services:
  db:
    image: postgres:17
    container_name: databases
    environment:
      POSTGRES_USER: shortener_user
      POSTGRES_PASSWORD: shortener_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  shortener-app:
    build:
      context: .
      dockerfile: core-app/Dockerfile
    ports: [ "8080:8080" ]
    depends_on: [ db, redis, kafka, safety-py ]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shortener_db
      SPRING_DATASOURCE_USERNAME: shortener_user
      SPRING_DATASOURCE_PASSWORD: shortener_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      GRPC_CLIENT_SAFETY_SERVICE_ADDRESS: static://safety-py:9091

  analytics-app:
    build:
      context: .
      dockerfile: analytics/Dockerfile
    ports: [ "8082:8082" ]
    depends_on: [ db, kafka ]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/analytics_db
      SPRING_DATASOURCE_USERNAME: shortener_user
      SPRING_DATASOURCE_PASSWORD: shortener_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  safety-py:
    build: ./safety-service
    ports: [ "9091:9091" ]

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
